<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080C14">
<link rel="manifest" href="manifest.json">
<title>客流统计</title>
<style>
:root {
  --cyan: #00E5FF; --gold: #FFD740; --red: #FF3D5C; --green: #00E676;
  --bg: #060911; --card: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06); --text-dim: rgba(255,255,255,0.30);
  --glow-cyan: 0 0 20px rgba(0,229,255,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,229,255,0.04) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 50%,rgba(121,40,202,0.04) 0%,transparent 60%),
             var(--bg);
}

#cam{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;opacity:1;
  filter:brightness(1.03) contrast(1.03);
  transition:filter .4s;
}

#overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}

#countLine{
  position:absolute;top:4%;bottom:4%;left:55%;width:1.5px;z-index:6;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(0,229,255,.5) 15%,rgba(0,229,255,.5) 85%,transparent);
  box-shadow:0 0 12px rgba(0,229,255,.25);
  transition:all .5s;
}
#countLine.active{
  box-shadow:0 0 24px rgba(0,229,255,.5),0 0 48px rgba(0,229,255,.15);
  width:2px;
}

#topBar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top,18px)) 16px 8px;
  background:linear-gradient(180deg,rgba(6,9,17,.7),transparent);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#recDot{
  width:6px;height:6px;border-radius:50%;
  background:var(--red);box-shadow:0 0 6px var(--red);
  opacity:0;transition:opacity .3s;
}
#recDot.active{opacity:1;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--red)}50%{opacity:.3;box-shadow:0 0 12px var(--red)}}
#clockText{color:var(--text-dim);font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.5px}

#timerBox{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:15;text-align:center;pointer-events:none;
}
#timerBox.active{pointer-events:auto}
#timerCancel{display:none;margin-top:10px;padding:6px 18px;border-radius:20px;border:1px solid rgba(255,61,92,.3);background:rgba(255,61,92,.1);color:var(--red);font-size:12px;cursor:pointer;letter-spacing:.5px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#timerCancel.show{display:inline-block}
#timerCancel:active{background:rgba(255,61,92,.25)}
#timer{
  font-size:52px;font-weight:200;color:var(--cyan);
  letter-spacing:5px;font-variant-numeric:tabular-nums;
  text-shadow:0 0 30px rgba(0,229,255,.25);
  transition:color .4s;
}
#timer.warn{color:var(--gold);text-shadow:0 0 30px rgba(255,215,64,.3)}
#timer.urgent{color:var(--red);text-shadow:0 0 30px rgba(255,61,92,.3);animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
#timerLabel{font-size:10px;color:var(--text-dim);margin-top:3px;letter-spacing:3px;text-transform:uppercase;opacity:0.5}

#panel{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:linear-gradient(180deg,transparent 0%,rgba(6,9,17,.85) 30%,rgba(6,9,17,.95) 100%);
  padding:20px 16px max(20px,env(safe-area-inset-bottom,20px));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}

#stats{display:flex;justify-content:center;margin-bottom:18px}
.statCard{
  text-align:center;padding:14px 32px;
  background:var(--card);border-radius:20px;
  border:1px solid var(--border);min-width:100px;
  transition:all .25s;position:relative;
}
.statCard::after{
  content:'';position:absolute;inset:-1px;border-radius:20px;
  background:linear-gradient(135deg,rgba(0,229,255,.08),transparent 50%,rgba(121,40,202,.05));
  z-index:-1;
}
.statCard.flash{background:rgba(0,229,255,.10);border-color:rgba(0,229,255,.25);box-shadow:var(--glow-cyan)}
.statCard .num{
  font-size:38px;font-weight:300;color:#fff;
  font-variant-numeric:tabular-nums;line-height:1;
  transition:transform .15s,color .15s;
}
.statCard .num.pop{transform:scale(1.3);color:var(--cyan)}
.statCard .lbl{
  font-size:10px;color:var(--text-dim);margin-top:5px;
  letter-spacing:2px;text-transform:uppercase;font-weight:500;
}

#btns{display:flex;gap:10px;justify-content:center;align-items:center}
.btn{
  padding:10px 18px;border-radius:22px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  letter-spacing:.3px;transition:all .15s;
  display:flex;align-items:center;gap:5px;
  -webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.btn:active{transform:scale(.95)}
.btnStart{
  background:linear-gradient(135deg,#FF3D5C,#D50047);
  color:#fff;box-shadow:0 2px 12px rgba(255,61,92,.25);
  padding:10px 24px;font-size:14px;
}
.btnStart.running{
  background:linear-gradient(135deg,#00C4D4,#008BA3);
  box-shadow:0 2px 12px rgba(0,229,255,.25);
}
.btnTimer{background:rgba(255,215,64,.08);color:var(--gold);border:1px solid rgba(255,215,64,.15)}
.btnExport{background:rgba(0,230,118,.08);color:var(--green);border:1px solid rgba(0,230,118,.15)}
.btnReset{background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid var(--border);padding:10px 12px}

#statusBar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
#statusDot{width:4px;height:4px;border-radius:50%;background:var(--text-dim);transition:all .3s}
#statusDot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
#statusText{font-size:10px;color:var(--text-dim);letter-spacing:.5px;font-weight:400}

#modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:50;
  justify-content:center;align-items:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#modal.show{display:flex}
#modalInner{
  background:linear-gradient(145deg,rgba(16,20,36,.98),rgba(8,12,24,.98));
  border:1px solid rgba(0,229,255,.10);border-radius:24px;
  padding:28px;width:280px;text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
#modalInner h3{color:#fff;font-size:16px;font-weight:500;margin-bottom:18px}
#modalInner .field{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
#modalInner input{
  width:68px;padding:10px 4px;
  background:rgba(255,255,255,.04);border:1px solid rgba(0,229,255,.15);
  border-radius:12px;color:var(--cyan);font-size:24px;text-align:center;
  font-weight:300;outline:none;transition:border-color .2s;
}
#modalInner input:focus{border-color:var(--cyan)}
#modalInner .unit{color:var(--text-dim);font-size:13px}
.modalBtn{
  padding:10px 20px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.modalBtn:active{transform:scale(.95)}
.modalBtn.confirm{background:linear-gradient(135deg,var(--gold),#E6A800);color:#000}
.modalBtn.cancel{background:rgba(255,255,255,.06);color:var(--text-dim)}

#toast{
  position:fixed;top:50px;left:50%;transform:translateX(-50%) translateY(-10px);
  z-index:60;padding:8px 20px;border-radius:20px;
  background:rgba(0,0,0,.88);color:#fff;font-size:12px;font-weight:500;
  opacity:0;transition:all .3s;pointer-events:none;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="countLine"></div>

<div id="topBar">
  <div id="recDot"></div>
  <span id="clockText"></span>
</div>

<div id="timerBox">
  <div id="timer">--:--</div>
  <div id="timerLabel">倒计时</div>
  <button id="timerCancel" onclick="cancelTimer()">✕ 取消计时</button>
</div>

<div id="panel">
  <div id="stats">
    <div class="statCard" id="cardTotal">
      <div class="num" id="nTotal">0</div>
      <div class="lbl">总人次</div>
    </div>
  </div>
  <div id="btns">
    <button class="btn btnStart" id="btnGo" onclick="toggle()">▶ 开始计数</button>
    <button class="btn btnTimer" onclick="showTimerModal()">⏱ 定时</button>
    <button class="btn btnExport" onclick="exportExcel()">📊 导出</button>
    <button class="btn btnReset" onclick="resetAll()">↺</button>
  </div>
  <div id="statusBar">
    <div id="statusDot"></div>
    <span id="statusText">就绪 · 点击「开始计数」启动</span>
  </div>
</div>

<div id="modal">
  <div id="modalInner">
    <h3>⏱ 设置倒计时</h3>
    <div class="field">
      <input id="minInp" type="number" value="60" min="1" max="1440" inputmode="numeric">
      <span class="unit">分钟</span>
    </div>
    <button class="modalBtn confirm" onclick="startTimer()">开始计时</button>
    <button class="modalBtn cancel" onclick="document.getElementById('modal').classList.remove('show')">取消</button>
  </div>
</div>

<div id="toast"></div>

<script>
// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// CSV 导出
function exportCSV(rows,f){
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',')}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=f;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

var toastTimer;
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show')},1800);
}

var totalCount=0;
var counting=false;
var hourly={},currentHour=new Date().getHours();
var timerSeconds=0,timerRemaining=0,timerInterval=null;

var video=document.getElementById('cam');
var overlay=document.getElementById('overlay');
var octx=overlay.getContext('2d');

var DIFF_THRESHOLD=35,MIN_BLOB_SIZE=250,MIN_BLOB_AREA=400;
var MAX_ASPECT_RATIO=0.60,PERSIST_FRAMES=5,COOLDOWN_FRAMES=45;
var SPATIAL_COOLDOWN=80,REFRESH_REF_EVERY=25,COUNT_LINE=0.55,PROCESS_W=480;
var TRACK_MAX_GAP=100,SHAKE_BLOB_LIMIT=10,SHAKE_SUPPRESS_MS=800;

var refFrame=null,frameNum=0;
var blobTrails={},nextTrailId=0;
var lastCountedFrame={};
var spatialCooldowns={},nextSpatialId=0;
var runningBrightness=128,lastShakeTime=0;
var offscreen=document.createElement('canvas'),offCtx=offscreen.getContext('2d');

function startCam(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    setStatus('浏览器不支持摄像头',false);showToast('请使用 Chrome 或 Safari');return;
  }
  findBackCamera().then(function(deviceId){
    return tryCameraConstraints(deviceId);
  }).catch(function(){return tryCameraConstraints(null)});
}
function findBackCamera(){
  return navigator.mediaDevices.enumerateDevices().then(function(devices){
    var bc=null;
    for(var i=0;i<devices.length;i++){
      var d=devices[i];
      if(d.kind==='videoinput'){
        var l=(d.label||'').toLowerCase();
        if(l.indexOf('back')!==-1||l.indexOf('rear')!==-1||l.indexOf('environment')!==-1||l.indexOf('后置')!==-1||l.indexOf('背面')!==-1){bc=d.deviceId;break}
      }
    }
    if(!bc){
      for(var j=devices.length-1;j>=0;j--){
        var dd=devices[j];
        if(dd.kind==='videoinput'){
          var ll=(dd.label||'').toLowerCase();
          if(ll.indexOf('front')===-1&&ll.indexOf('前置')===-1){bc=dd.deviceId;break}
        }
      }
    }
    return bc;
  });
}
function tryCameraConstraints(deviceId){
  var isAndroid=/android/i.test(navigator.userAgent);
  var isChrome=/chrome/i.test(navigator.userAgent)&&!/edge/i.test(navigator.userAgent);
  var attempts=[];
  if(isAndroid&&isChrome){
    attempts.push({name:'hd-min',video:buildC(deviceId,{min:1280},{min:720},30)});
    attempts.push({name:'sd-min',video:buildC(deviceId,{min:640},{min:480},24)});
  }
  attempts.push({name:'hd-ideal',video:buildC(deviceId,{ideal:1920},{ideal:1080},30)});
  attempts.push({name:'720p',video:buildC(deviceId,1280,720,24)});
  attempts.push({name:'vga-min',video:buildC(deviceId,{min:640},{min:480},24)});
  attempts.push({name:'default',video:buildC(deviceId)});
  return tryNext(attempts,0);
}
function buildC(deviceId,w,h,fps){
  var c={audio:false},v={};
  if(deviceId)v.deviceId={exact:deviceId};else v.facingMode='environment';
  if(w!==undefined)v.width=typeof w==='object'?w:{exact:w};
  if(h!==undefined)v.height=typeof h==='object'?h:{exact:h};
  if(fps!==undefined)v.frameRate={ideal:fps,min:10};
  c.video=v;return c;
}
function tryNext(attempts,index){
  if(index>=attempts.length){
    setStatus('无法打开摄像头 · 请检查权限',false);
    showToast('摄像头启动失败');return Promise.reject('all failed');
  }
  var a=attempts[index];
  return navigator.mediaDevices.getUserMedia(a.video).then(function(s){
    video.srcObject=s;
    return video.play().then(function(){
      return new Promise(function(resolve){
        if(video.videoWidth&&video.videoHeight)resolve();
        else{video.addEventListener('loadedmetadata',resolve,{once:true});setTimeout(resolve,3000)}
      });
    });
  }).then(function(){
    var w=video.videoWidth,h=video.videoHeight;
    if(!w||!h)return new Promise(function(r){setTimeout(function(){var w2=video.videoWidth,h2=video.videoHeight;setStatus('就绪 · 摄像头 '+(w2||'?')+'×'+(h2||'?')+' · 点击「开始计数」启动',false);r()},500)});
    setStatus('就绪 · 摄像头 '+w+'×'+h+' · 点击「开始计数」启动',false);
  }).catch(function(e){
    return tryNext(attempts,index+1);
  });
}

function findBlobs(mask,w,h){
  var visited=new Uint8Array(w*h),blobs=[];
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var idx=y*w+x;
      if(mask[idx]&&!visited[idx]){
        var queue=[[x,y]];visited[idx]=1;
        var minX=x,maxX=x,minY=y,maxY=y,area=0;
        while(queue.length){
          var p=queue.shift(),cx=p[0],cy=p[1];area++;
          if(cx<minX)minX=cx;if(cx>maxX)maxX=cx;
          if(cy<minY)minY=cy;if(cy>maxY)maxY=cy;
          var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
          for(var d=0;d<4;d++){
            var nx=cx+dirs[d][0],ny=cy+dirs[d][1];
            if(nx>=0&&nx<w&&ny>=0&&ny<h){
              var ni=ny*w+nx;
              if(mask[ni]&&!visited[ni]){visited[ni]=1;queue.push([nx,ny])}
            }
          }
        }
        if(area>=MIN_BLOB_SIZE&&area>=MIN_BLOB_AREA){
          var bw=maxX-minX+1,bh=maxY-minY+1;
          blobs.push({cx:(minX+maxX)/2,cy:(minY+maxY)/2,w:bw,h:bh,area:area,aspectRatio:bw/Math.max(bh,1)});
        }
      }
    }
  }
  return blobs;
}

function detect(){
  if(!counting)return;
  var vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh){requestAnimationFrame(detect);return}
  var scale=PROCESS_W/vw,pw=PROCESS_W,ph=Math.round(vh*scale);
  offscreen.width=pw;offscreen.height=ph;
  offCtx.drawImage(video,0,0,pw,ph);
  var frame=offCtx.getImageData(0,0,pw,ph);
  var sumB=0;
  for(var bi=0;bi<frame.data.length;bi+=4)sumB+=(frame.data[bi]+frame.data[bi+1]+frame.data[bi+2])/3;
  runningBrightness=runningBrightness*0.9+(sumB/(frame.data.length/4))*0.1;
  var aThresh=DIFF_THRESHOLD*(runningBrightness/128);
  aThresh=Math.max(15,Math.min(45,aThresh));
  if(!refFrame||frameNum%REFRESH_REF_EVERY===0){refFrame=offCtx.getImageData(0,0,pw,ph);frameNum++;requestAnimationFrame(detect);return}
  frameNum++;
  var mask=new Uint8Array(pw*ph);
  for(var i=0;i<frame.data.length;i+=4){
    mask[i/4]=Math.max(Math.abs(frame.data[i]-refFrame.data[i]),Math.abs(frame.data[i+1]-refFrame.data[i+1]),Math.abs(frame.data[i+2]-refFrame.data[i+2]))>aThresh?1:0;
  }
  var blobs=findBlobs(mask,pw,ph);
  var validBlobs=[];
  for(var vb=0;vb<blobs.length;vb++)if(blobs[vb].aspectRatio<=MAX_ASPECT_RATIO)validBlobs.push(blobs[vb]);
  var isShaking=validBlobs.length>SHAKE_BLOB_LIMIT;
  if(isShaking)lastShakeTime=Date.now();
  var shakeActive=(Date.now()-lastShakeTime)<SHAKE_SUPPRESS_MS;
  overlay.width=vw;overlay.height=vh;
  if(shakeActive){octx.fillStyle='rgba(255,61,92,.5)';octx.font='bold 14px sans-serif';octx.fillText('\u26a0 \u76f8\u673a\u6643\u52a8\uff0c\u6682\u505c\u8ba1\u6570',20,40)}
  var matched={},nowFrame=frameNum;
  for(var b=0;b<validBlobs.length;b++){
    var blob=validBlobs[b],bx=blob.cx/scale,by=blob.cy/scale,bw=blob.w/scale,bh=blob.h/scale;
    var trailId=null,bestDist=TRACK_MAX_GAP;
    var keys=Object.keys(blobTrails);
    for(var k=0;k<keys.length;k++){
      var id=parseInt(keys[k]),t=blobTrails[id];
      var px=t.cx+(t.vx||0),py=t.cy+(t.vy||0),dx=bx-px,dy=by-py;
      if(Math.sqrt(dx*dx+dy*dy)<bestDist){bestDist=Math.sqrt(dx*dx+dy*dy);trailId=id}
    }
    if(trailId===null){
      trailId=nextTrailId++;
      blobTrails[trailId]={cx:bx,cy:by,prevCx:bx,prevCy:by,vx:0,vy:0,counted:false,life:10,persistCount:1};
    }else{
      var t=blobTrails[trailId];
      t.vx=bx-t.cx;t.vy=by-t.cy;t.prevCx=t.cx;t.prevCy=t.cy;
      t.cx=bx;t.cy=by;t.life=10;
      t.persistCount=Math.min((t.persistCount||0)+1,PERSIST_FRAMES+1);
      var isP=t.persistCount>=PERSIST_FRAMES;
      var cdPassed=!lastCountedFrame[trailId]||(nowFrame-lastCountedFrame[trailId])>COOLDOWN_FRAMES;
      if(!t.counted&&isP&&cdPassed&&!shakeActive){
        var prevX=t.prevCx/vw,curX=t.cx/vw;
        var tooClose=false;
        var scK=Object.keys(spatialCooldowns);
        for(var sc=0;sc<scK.length;sc++){
          var sd=spatialCooldowns[scK[sc]];
          if(Date.now()-sd.time<3000){if(Math.sqrt(Math.pow(t.cx-sd.x,2)+Math.pow(t.cy-sd.y,2))<SPATIAL_COOLDOWN){tooClose=true;break}}
          else delete spatialCooldowns[scK[sc]];
        }
        if(!tooClose&&((prevX>COUNT_LINE&&curX<=COUNT_LINE)||(prevX<COUNT_LINE&&curX>=COUNT_LINE))){
          totalCount++;
          t.counted=true;lastCountedFrame[trailId]=nowFrame;
          spatialCooldowns['sc'+(nextSpatialId++)]={x:t.cx,y:t.cy,time:Date.now()};
          updateUI();saveHourly();flashCard('cardTotal');
          setStatus('检测到: '+totalCount+' 人次',true);
        }
      }
    }
    matched[trailId]=true;
    var tt=blobTrails[trailId],isP=(tt.persistCount||0)>=PERSIST_FRAMES;
    octx.strokeStyle=tt.counted?'rgba(0,230,118,.6)':isP?'rgba(0,229,255,.6)':'rgba(255,215,64,.3)';
    octx.lineWidth=isP?2.5:1.5;
    octx.strokeRect(bx-bw/2,by-bh/2,bw,bh);
    if(tt.counted){octx.fillStyle='rgba(0,230,118,.7)';octx.font='bold 11px sans-serif';octx.fillText('\u2713',bx+bw/2+4,by-bh/2+13)}
    else if(isP){octx.fillStyle='rgba(0,229,255,.5)';octx.font='9px sans-serif';octx.fillText(tt.persistCount+'/'+PERSIST_FRAMES,bx-bw/2,by-bh/2-3)}
  }
  var allK=Object.keys(blobTrails);
  for(var kk=0;kk<allK.length;kk++){var tid=parseInt(allK[kk]);if(!matched[tid]){blobTrails[tid].life--;if(blobTrails[tid].life<=0){delete blobTrails[tid];delete lastCountedFrame[tid]}}}
  var lineX=vw*COUNT_LINE;
  octx.strokeStyle='rgba(0,229,255,.35)';octx.lineWidth=1.5;octx.setLineDash([8,6]);
  octx.beginPath();octx.moveTo(lineX,0);octx.lineTo(lineX,vh);octx.stroke();octx.setLineDash([]);
  octx.fillStyle='rgba(0,229,255,.4)';octx.font='bold 11px sans-serif';octx.fillText('\u25c6 \u8ba1\u6570\u7ebf',lineX-60,26);
  requestAnimationFrame(detect);
}

function updateUI(){document.getElementById('nTotal').textContent=totalCount}
function flashCard(id){
  var card=document.getElementById(id),num=card.querySelector('.num');
  num.classList.add('pop');card.classList.add('flash');
  setTimeout(function(){num.classList.remove('pop');card.classList.remove('flash')},200);
}
function setStatus(msg,active){
  document.getElementById('statusText').textContent=msg;
  document.getElementById('statusDot').className=active?'on':'';
}
function toggle(){
  counting=!counting;
  var btn=document.getElementById('btnGo'),rec=document.getElementById('recDot'),line=document.getElementById('countLine');
  if(counting){btn.textContent='\u23f8 \u6682\u505c';btn.classList.add('running');rec.classList.add('active');line.classList.add('active');setStatus('检测中...',true);showToast('\u{1f534} \u8ba1\u6570\u5df2\u5f00\u59cb');requestAnimationFrame(detect)}
  else{btn.textContent='\u25b6 \u5f00\u59cb\u8ba1\u6570';btn.classList.remove('running');rec.classList.remove('active');line.classList.remove('active');setStatus('已暂停',false);saveHourly()}
}
function resetAll(){
  totalCount=0;hourly={};refFrame=null;blobTrails={};nextTrailId=0;frameNum=0;
  lastCountedFrame={};spatialCooldowns={};nextSpatialId=0;lastShakeTime=0;
  updateUI();setStatus('已重置',false);showToast('\u21ba \u6570\u636e\u5df2\u6e05\u96f6');
}
function saveHourly(){
  var h=new Date().getHours();if(h!==currentHour)currentHour=h;
  var key=h+':00-'+(h+1)+':00';if(!hourly[key])hourly[key]=0;
  hourly[key]=Math.max(hourly[key],totalCount);
}
function showTimerModal(){document.getElementById('modal').classList.add('show');document.getElementById('minInp').focus()}
function startTimer(){
  var min=parseInt(document.getElementById('minInp').value)||60;
  timerSeconds=min*60;timerRemaining=timerSeconds;
  document.getElementById('modal').classList.remove('show');
  document.getElementById('timerBox').classList.add('active');
  document.getElementById('timerCancel').classList.add('show');
  updateTimerDisplay();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerRemaining--;updateTimerDisplay();
    if(timerRemaining<=0){clearInterval(timerInterval);timerInterval=null;document.getElementById('timerBox').classList.remove('active');document.getElementById('timerCancel').classList.remove('show');if(counting)toggle();showToast('\u23f0 \u8ba1\u65f6\u7ed3\u675f\uff01');document.getElementById('timer').textContent='--:--';document.getElementById('timer').className=''}
  },1000);
}
function cancelTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  timerRemaining=0;document.getElementById('timer').textContent='--:--';document.getElementById('timer').className='';
  document.getElementById('timerBox').classList.remove('active');document.getElementById('timerCancel').classList.remove('show');
  showToast('计时已取消');
}
function updateTimerDisplay(){
  var el=document.getElementById('timer');
  if(timerRemaining>0){var m=Math.floor(timerRemaining/60),s=timerRemaining%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.className=timerRemaining<60?'urgent':timerRemaining<300?'warn':''}
  else{el.textContent='--:--';el.className=''}
}
function exportExcel(){
  saveHourly();var hours=Object.keys(hourly).sort();
  if(hours.length===0){showToast('暂无数据可导出');return}
  var rows=[['时段','人次']];
  hours.forEach(function(h){rows.push([h,hourly[h]||0])});
  var total=hours.reduce(function(s,h){return s+(hourly[h]||0)},0);
  rows.push(['合计',total]);
  exportCSV(rows,'客流统计_'+new Date().toLocaleDateString('zh-CN')+'.csv');
  showToast('\u{1f4ca} CSV \u5df2\u5bfc\u51fa\uff08\u53ef\u7528 Excel \u6253\u5f00\uff09');
}
function updateClock(){
  document.getElementById('clockText').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,10000);updateClock();
startCam();
</script>
