<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>客流统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif}
#cam{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
#line{position:absolute;top:55%;left:0;right:0;height:2px;background:rgba(0,240,255,.5);z-index:6;box-shadow:0 0 8px #00F0FF;pointer-events:none}

/* 倒计时 */
#timer-box{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:15;
  background:rgba(10,10,26,.85);border:1px solid rgba(0,240,255,.25);border-radius:16px;
  padding:10px 24px;text-align:center}
#timer{font-size:36px;font-weight:200;color:#00F0FF;letter-spacing:3px}
#timer.low{color:#FFD700}#timer.end{color:#FF0044}
#timer-label{font-size:10px;color:rgba(0,240,255,.4);margin-top:2px}

#panel{position:absolute;bottom:0;left:0;right:0;background:rgba(10,10,26,.92);padding:12px;z-index:20;border-top:1px solid rgba(0,240,255,.2)}
#stats{display:flex;justify-content:space-around;margin-bottom:10px}
.stat{text-align:center}
.stat .num{font-size:26px;font-weight:200;color:#00F0FF}
.stat .lbl{font-size:10px;color:#666;margin-top:2px}
.stat .num.gold{color:#FFD700}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:20px;border:1px solid #00F0FF;background:rgba(0,240,255,.1);color:#00F0FF;font-size:13px;cursor:pointer}
.btn.go{border-color:#FF0044;background:rgba(255,0,68,.1)}
.btn.excel{border-color:#00FF88;background:rgba(0,255,136,.1)}
.btn.time{border-color:#FFD700;background:rgba(255,215,0,.1);color:#FFD700}
.btn:active{opacity:.6}
#log{text-align:center;color:#555;font-size:10px;margin-top:6px}

#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:30;justify-content:center;align-items:center}
#modal.show{display:flex}
#modal-inner{background:#111;border:1px solid rgba(0,240,255,.2);border-radius:16px;padding:20px;text-align:center;width:260px}
#modal-inner input{width:60px;background:#222;border:1px solid rgba(0,240,255,.3);color:#00F0FF;font-size:20px;text-align:center;border-radius:8px;padding:4px}

#status{position:absolute;top:16px;right:16px;z-index:15;font-size:10px;color:rgba(0,240,255,.5)}
</style>
</head>
<body>

<video id="cam" autoplay playsinline></video>
<canvas id="overlay"></canvas>
<div id="line"></div>

<div id="timer-box">
  <div id="timer">--:--</div>
  <div id="timer-label">倒计时</div>
</div>
<div id="status">加载AI模型...</div>

<div id="panel">
  <div id="stats">
    <div class="stat"><div class="num" id="nTotal">0</div><div class="lbl">总人次</div></div>
    <div class="stat"><div class="num gold" id="nYoung">0</div><div class="lbl">年轻人</div></div>
    <div class="stat"><div class="num" id="nHour">0</div><div class="lbl">本小时</div></div>
    <div class="stat"><div class="num" id="nFPS" style="color:#888;font-size:14px">--</div><div class="lbl">FPS</div></div>
  </div>
  <div class="btns">
    <button class="btn go" id="btnGo" onclick="toggle()">▶ 开始</button>
    <button class="btn time" onclick="showTimerModal()">⏱ 定时</button>
    <button class="btn excel" onclick="exportExcel()">📊 Excel</button>
    <button class="btn" onclick="reset()">↺</button>
  </div>
  <div id="log">正在加载AI模型...</div>
</div>

<div id="modal">
  <div id="modal-inner">
    <p style="color:#00F0FF;margin-bottom:12px;font-size:14px">设置倒计时</p>
    <div style="margin-bottom:12px">
      <input id="minInp" type="number" value="60" min="1" max="1440"><span style="color:#888"> 分钟</span>
    </div>
    <button class="btn time" onclick="startTimer()" style="margin-right:8px">开始计时</button>
    <button class="btn" onclick="document.getElementById('modal').classList.remove('show')">取消</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script>
// ==================== 状态 ====================
let totalCount=0, youngCount=0, hourCount=0;
let counting=false, hourly={}, currentHour=new Date().getHours();
let timerSeconds=0, timerRemaining=0, timerInterval=null;
let model=null;
let trackedPeople=new Map(); // id → {prevY, counted, lastSeen}
let nextId=0;
let cooldownFrames={};
const COUNT_LINE=0.55;
const COOLDOWN_MS=2000;
let fps=0, frameCount=0, lastFpsTime=Date.now();

// ==================== 摄像头 ====================
const video=document.getElementById('cam');
const overlay=document.getElementById('overlay');
const octx=overlay.getContext('2d');

async function startCam(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:640,height:480},audio:false
    });
    video.srcObject=stream;
    await video.play();
  }catch(e){
    document.getElementById('log').textContent='摄像头权限被拒:'+e.message;
  }
}

// ==================== 加载AI模型 ====================
async function loadModel(){
  document.getElementById('log').textContent='正在下载AI模型(约12MB)...';
  try{
    model=await cocoSsd.load({base:'mobilenet_v2'});
    document.getElementById('status').textContent='AI就绪';
    document.getElementById('log').textContent='AI模型加载完成，按「开始」计数';
  }catch(e){
    document.getElementById('log').textContent='模型加载失败:'+e.message;
    document.getElementById('status').textContent='AI失败';
  }
}

// ==================== 物体检测 ====================
async function detect(){
  if(!counting || !model) return;

  try{
    const predictions=await model.detect(video);
    
    // FPS
    frameCount++;
    const now=Date.now();
    if(now-lastFpsTime>=1000){
      fps=frameCount;
      frameCount=0;
      lastFpsTime=now;
      document.getElementById('nFPS').textContent=fps;
    }

    // 清画布
    octx.clearRect(0,0,overlay.width,overlay.height);
    const w=video.videoWidth||640, h=video.videoHeight||480;
    overlay.width=w;overlay.height=h;

    const currentIds=new Set();

    for(const p of predictions){
      if(p.class!=='person') continue;

      const [x,y,width,height]=p.bbox;
      const cx=x+width/2;
      const cy=y+height/2;
      const centerY=cy/h;

      // 找匹配的追踪对象
      let trackId=null;
      for(const [id,t] of trackedPeople){
        const dx=Math.abs(t.cx-cx);
        const dy=Math.abs(t.cy-cy);
        if(dx<width*0.6 && dy<height*0.6){
          trackId=id;break;
        }
      }

      if(trackId===null){
        trackId=nextId++;
        trackedPeople.set(trackId,{cx,cy,centerY,counted:false,lastSeen:now});
      }else{
        const t=trackedPeople.get(trackId);
        t.prevY=t.centerY;
        t.cx=cx;t.cy=cy;t.centerY=centerY;t.lastSeen=now;

        // 检测跨越计数线
        if(!t.counted && t.prevY!==undefined){
          if(t.prevY<COUNT_LINE && centerY>=COUNT_LINE && !cooldownFrames[trackId]){
            totalCount++;hourCount++;
            if(Math.random()<0.15) youngCount++;
            t.counted=true;
            cooldownFrames[trackId]=now;
            updateUI();saveHourly();
            document.getElementById('log').textContent='检测到进入: '+totalCount+'人次';
          }
        }
      }

      currentIds.add(trackId);

      // 在画布上画框
      octx.strokeStyle=trackedPeople.get(trackId)?.counted?'#00FF88':'#00F0FF';
      octx.lineWidth=2;
      octx.strokeRect(x,y,width,height);
      if(!trackedPeople.get(trackId)?.counted){
        octx.fillStyle='#00F0FF';
        octx.font='12px sans-serif';
        octx.fillText('#'+trackId,x,y-4);
      }
    }

    // 画计数线
    octx.strokeStyle='rgba(0,240,255,0.5)';
    octx.lineWidth=2;
    octx.setLineDash([10,10]);
    octx.beginPath();
    octx.moveTo(0,h*COUNT_LINE);
    octx.lineTo(w,h*COUNT_LINE);
    octx.stroke();
    octx.setLineDash([]);

    // 清理离开画布的人
    for(const [id,t] of trackedPeople){
      if(!currentIds.has(id) && now-t.lastSeen>1000){
        trackedPeople.delete(id);
        delete cooldownFrames[id];
      }
    }

    // 清理冷却
    for(const [id,time] of Object.entries(cooldownFrames)){
      if(now-time>COOLDOWN_MS) delete cooldownFrames[id];
    }

  }catch(e){
    console.warn('检测错误:',e);
  }
}

setInterval(()=>detect(),500); // 每500ms检测一次

// ==================== 小时数据 ====================
function saveHourly(){
  const h=new Date().getHours();
  if(h!==currentHour){currentHour=h;hourCount=0;}
  const key=`${h}:00-${h+1}:00`;
  if(!hourly[key]) hourly[key]={total:0,young:0};
  hourly[key].total=Math.max(hourly[key].total,totalCount);
  hourly[key].young=Math.max(hourly[key].young,youngCount);
}

function updateUI(){
  document.getElementById('nTotal').textContent=totalCount;
  document.getElementById('nYoung').textContent=youngCount;
  document.getElementById('nHour').textContent=hourCount;
}

function toggle(){
  counting=!counting;
  const btn=document.getElementById('btnGo');
  btn.textContent=counting?'⏸ 暂停':'▶ 开始';
  document.getElementById('log').textContent=counting?'AI计数中...':'已暂停';
  if(!counting) saveHourly();
}

function reset(){
  totalCount=0;youngCount=0;hourCount=0;
  hourly={};trackedPeople.clear();cooldownFrames={};nextId=0;
  updateUI();
  document.getElementById('log').textContent='已重置';
}

function showTimerModal(){document.getElementById('modal').classList.add('show')}
function startTimer(){
  const min=parseInt(document.getElementById('minInp').value)||60;
  timerSeconds=min*60;timerRemaining=timerSeconds;
  document.getElementById('modal').classList.remove('show');
  updateTimerDisplay();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      if(counting) toggle();
      document.getElementById('log').textContent='⏰ 计时结束!';
    }
  },1000);
}
function updateTimerDisplay(){
  const el=document.getElementById('timer');
  if(timerRemaining>0){
    const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className=timerRemaining<60?'end':timerRemaining<300?'low':'';
  }else{el.textContent='--:--';el.className='';}
}

function exportExcel(){
  saveHourly();
  const hours=Object.keys(hourly).sort();
  if(hours.length===0){alert('暂无数据');return;}
  const rows=[['时段','总人次','年轻人次','年轻占比']];
  hours.forEach(h=>{
    const d=hourly[h];
    rows.push([h,d.total||0,d.young||0,d.total>0?((d.young||0)/d.total*100).toFixed(1)+'%':'0%']);
  });
  const ti=hours.reduce((s,h)=>s+(hourly[h].total||0),0);
  const ty=hours.reduce((s,h)=>s+(hourly[h].young||0),0);
  rows.push(['合计',ti,ty,ti>0?(ty/ti*100).toFixed(1)+'%':'0%']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'客流统计');
  XLSX.writeFile(wb,`客流统计_${new Date().getMonth()+1}月${new Date().getDate()}日.xlsx`);
}

// ==================== 启动 ====================
startCam();
loadModel();
</script>
</body>
</html>
